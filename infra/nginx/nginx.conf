worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream api_backend {
        server api:3000;
    }

    upstream dashboard_frontend {
        server dashboard:5173;
    }

    server {
        listen 80;
        server_name localhost;

        # ── 前端标头强制清洗（Header Sanitization） ──
        # 清理所有来自外部请求中携带的 X-SecOps- 前缀标头，防止标头走私
        proxy_set_header X-SecOps-Simulation "";
        proxy_set_header X-SecOps-Sign "";
        proxy_set_header X-SecOps-Timestamp "";

        # ── API 代理 ──
        location /api/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── 前端静态资源 ──
        location / {
            proxy_pass http://dashboard_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
