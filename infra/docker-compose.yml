version: '3.8'

x-common-env: &common-env
  DATABASE_URL: postgresql://secops:${DB_PASSWORD:-secops_secure_pass_2024}@postgres:5432/secops_platform?schema=public
  REDIS_URL: redis://:${REDIS_PASSWORD:-secops_redis_pass_2024}@redis:6379/0
  NODE_ENV: production
  JWT_SECRET: ${JWT_SECRET:-please_change_this_to_a_random_secret_at_least_32_chars}
  ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY:-00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff}

services:
  postgres:
    image: postgres:16-alpine
    container_name: secpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: secops
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secops_secure_pass_2024}
      POSTGRES_DB: secops_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secops"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: secpilot-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secops_redis_pass_2024} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6378:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: secpilot-api
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: 3000
      SONARQUBE_URL: http://sonarqube:9000
      SONARQUBE_TOKEN: ${SONARQUBE_TOKEN:-admin_token_placeholder}
      ZAP_URL: http://zap:8080
      ZAP_API_KEY: ${ZAP_API_KEY:-zap_api_key_2024}
      MOBSF_URL: http://mobsf:8000
      MOBSF_API_KEY: ${MOBSF_API_KEY:-mobsf_api_key_2024}
      NUCLEI_PATH: /usr/local/bin/nuclei
      OSV_SCANNER_PATH: /usr/local/bin/osv-scanner
      DEFECTDOJO_URL: ${DEFECTDOJO_URL:-}
      DEFECTDOJO_API_KEY: ${DEFECTDOJO_API_KEY:-}
      TRAFFIC_DYE_SALT: ${TRAFFIC_DYE_SALT:-change_me_to_a_random_salt}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      PAGERDUTY_ROUTING_KEY: ${PAGERDUTY_ROUTING_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-3000}:3000"
    command: >
      sh -c "npx prisma migrate deploy && node dist/index.js"

  worker:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: secpilot-worker
    restart: unless-stopped
    environment:
      <<: *common-env
      SONARQUBE_URL: http://sonarqube:9000
      SONARQUBE_TOKEN: ${SONARQUBE_TOKEN:-admin_token_placeholder}
      ZAP_URL: http://zap:8080
      ZAP_API_KEY: ${ZAP_API_KEY:-zap_api_key_2024}
      MOBSF_URL: http://mobsf:8000
      MOBSF_API_KEY: ${MOBSF_API_KEY:-mobsf_api_key_2024}
      NUCLEI_PATH: /usr/local/bin/nuclei
      OSV_SCANNER_PATH: /usr/local/bin/osv-scanner
      DEFECTDOJO_URL: ${DEFECTDOJO_URL:-}
      DEFECTDOJO_API_KEY: ${DEFECTDOJO_API_KEY:-}
      TRAFFIC_DYE_SALT: ${TRAFFIC_DYE_SALT:-change_me_to_a_random_salt}
      WORKER_MODE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: node dist/workers/scan-worker.js

  dashboard:
    build:
      context: ..
      dockerfile: apps/dashboard/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: secpilot-dashboard
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"

  sonarqube:
    image: sonarqube:10-community
    container_name: secpilot-sonarqube
    restart: unless-stopped
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonarqube
      SONAR_JDBC_PASSWORD: ${SONARQUBE_DB_PASSWORD:-sonarqube_pass_2024}
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    depends_on:
      sonarqube-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/api/system/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    profiles:
      - scanners

  sonarqube-db:
    image: postgres:16-alpine
    container_name: secpilot-sonarqube-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonarqube
      POSTGRES_PASSWORD: ${SONARQUBE_DB_PASSWORD:-sonarqube_pass_2024}
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonarqube"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - scanners

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: secpilot-zap
    restart: unless-stopped
    command: zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true -config api.key=${ZAP_API_KEY:-zap_api_key_2024}
    ports:
      - "${ZAP_PORT:-8081}:8080"
    volumes:
      - zap_data:/zap/webswing
    healthcheck:
      test: ["CMD-SHELL", "curl -f 'http://localhost:8080/JSON/core/view/version/?apikey=${ZAP_API_KEY:-zap_api_key_2024}' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    profiles:
      - scanners

  mobsf:
    image: opensecurity/mobile-security-framework-mobsf:latest
    container_name: secpilot-mobsf
    restart: unless-stopped
    user: "0:0"
    environment:
      - MOBSF_API_KEY=${MOBSF_API_KEY:-mobsf_api_key_2024}
      - MOBSF_HOME_DIR=/home/mobsf/.MobSF
    volumes:
      - mobsf_data:/home/mobsf/.MobSF
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ -o /dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
    profiles:
      - scanners

volumes:
  postgres_data:
  redis_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  sonarqube_db_data:
  zap_data:
  mobsf_data:
