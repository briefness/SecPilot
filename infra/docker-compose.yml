version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: secops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: secops
      POSTGRES_PASSWORD: secops_secure_pass_2024
      POSTGRES_DB: secops_platform
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secops"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: secops-redis
    restart: unless-stopped
    command: redis-server --requirepass secops_redis_pass_2024 --appendonly yes
    ports:
      - "6378:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx-gateway:
    image: nginx:1.27-alpine
    container_name: secops-gateway
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    profiles:
      - gateway

  sonarqube:
    image: sonarqube:10-community
    container_name: secops-sonarqube
    restart: unless-stopped
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonarqube
      SONAR_JDBC_PASSWORD: sonarqube_pass_2024
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    depends_on:
      sonarqube-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/api/system/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    profiles:
      - scanners

  sonarqube-db:
    image: postgres:16-alpine
    container_name: secops-sonarqube-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonarqube
      POSTGRES_PASSWORD: sonarqube_pass_2024
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonarqube"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - scanners

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: secops-zap
    restart: unless-stopped
    command: zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true -config api.key=zap_api_key_2024
    ports:
      - "8080:8080"
    volumes:
      - zap_data:/zap/webswing
    healthcheck:
      test: ["CMD-SHELL", "curl -f 'http://localhost:8080/JSON/core/view/version/?apikey=zap_api_key_2024' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    profiles:
      - scanners

  mobsf:
    image: opensecurity/mobile-security-framework-mobsf:latest
    container_name: secops-mobsf
    restart: unless-stopped
    user: "0:0"
    environment:
      - MOBSF_API_KEY=mobsf_api_key_2024
      - MOBSF_HOME_DIR=/home/mobsf/.MobSF
    ports:
      - "8000:8000"
    volumes:
      - mobsf_data:/home/mobsf/.MobSF
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ -o /dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
    profiles:
      - scanners

  nuclei:
    image: projectdiscovery/nuclei:latest
    container_name: secops-nuclei
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c", "nuclei -update-templates && tail -f /dev/null"]
    volumes:
      - nuclei_templates:/root/nuclei-templates
      - nuclei_cache:/root/.cache/nuclei
    profiles:
      - scanners

volumes:
  postgres_data:
  redis_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  sonarqube_db_data:
  zap_data:
  mobsf_data:
  nuclei_templates:
  nuclei_cache:
